    <script>
        function toggleChat() {
            document.getElementById('chatContainer').classList.toggle('closed');
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const messageText = input.value.trim();
            if (!messageText) return;

            const messagesContainer = document.getElementById('chatMessages');
            
            const userDiv = document.createElement('div');
            userDiv.className = 'message user-message';
            userDiv.innerText = messageText;
            messagesContainer.appendChild(userDiv);
            
            input.value = '';
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            await generateBotResponse(messageText, messagesContainer);
        }

        async function generateBotResponse(userText, container) {
            const WORKER_URL = "https://gemini-portfolio-bridge.jeremydowdy-usa.workers.dev"; 

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "You are an AI assistant for Jeremy Dowdy. Keep answers concise and professional. Respond to this: " + userText }] }]
                    })
                });

                const json = await response.json();
                
                if (json.candidates && json.candidates.length > 0) {
                    const botReply = json.candidates[0].content.parts[0].text;
                    const botDiv = document.createElement('div');
                    botDiv.className = 'message ai-message';
                    botDiv.innerHTML = botReply; 
                    container.appendChild(botDiv);
                } else {
                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'message ai-message';
                    errorDiv.innerText = "Error: " + JSON.stringify(json);
                    container.appendChild(errorDiv);
                }
            } catch (error) {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'message ai-message';
                errorDiv.innerText = "Network Error: " + error.message;
                container.appendChild(errorDiv);
            }
            container.scrollTop = container.scrollHeight;
        }
    </script>
